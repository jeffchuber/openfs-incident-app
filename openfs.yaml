name: openfs-incident-response

backends:
  postgres:
    type: postgres
    connection_url: ${DATABASE_URL}
    table_name: openfs_incident_demo

  s3:
    type: s3
    bucket: ${S3_BUCKET}
    region: ${S3_REGION}
    endpoint: ${AWS_ENDPOINT_URL_S3}
    access_key_id: ${AWS_ACCESS_KEY_ID}
    secret_access_key: ${AWS_SECRET_ACCESS_KEY}

  chroma:
    type: chroma
    url: https://${CHROMA_URL}
    collection: openfs_runbooks
    api_key: ${CHROMA_API_KEY}
    tenant: ${CHROMA_TENANT}
    database: ${CHROMA_DATABASE}

  scratch_mem:
    type: memory

mounts:
  - path: /incidents
    backend: postgres
    mode: write_through

  - path: /oncall
    backend: postgres
    mode: write_through

  - path: /logs
    backend: s3
    mode: write_through

  - path: /runbooks
    backend: chroma

  - path: /scratch
    backend: scratch_mem
